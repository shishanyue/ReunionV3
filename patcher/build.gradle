plugins {
    id 'java'
    id 'maven-publish'
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

dependencies { implementation 'org.ow2.asm:asm:9.9.1' }

def rootDir = project.rootDir.absolutePath

def patchedJar = layout.buildDirectory.file('tmp/base-patched.jar')
def aarFile = layout.buildDirectory.file('aar/base-patched.aar')

tasks.register('patchJar', JavaExec) {
    group = 'patcher'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'cn.tesseract.patcher.JarPatcher'
    def rFile = "$rootDir/build/build-r.txt"
    args = ["$rootDir/libs/base.jar", patchedJar.get().asFile.absolutePath, '--remap-ids', rFile]
    workingDir = rootDir
    doFirst {
        patchedJar.get().asFile.parentFile.mkdirs()
        def srcR = file("$rootDir/app/build/intermediates/runtime_symbol_list/debug/processDebugResources/R.txt")
        def dstR = file(rFile)
        if (srcR.exists() && (!dstR.exists() || srcR.lastModified() > dstR.lastModified())) {
            dstR.bytes = srcR.bytes
            println "Synced R.txt (${srcR.readLines().size()} entries)"
        }
    }
}

tasks.register('buildAar', Zip) {
    group = 'patcher'
    def baseApkDir = "$rootDir/build/apk"
    archiveFileName = aarFile.get().asFile.name
    destinationDirectory = aarFile.get().asFile.parentFile
    from(patchedJar) { rename { 'classes.jar' } }
    from("$baseApkDir/res") { into 'res'; exclude 'values/public.xml' }
    from("$baseApkDir/assets") { into 'assets' }
    from("$rootDir/libs/aar") { include 'AndroidManifest.xml' }
    dependsOn 'patchJar'
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'cn.tesseract.soviet'
            artifactId = 'base-patched'
            version = '1.0'
            artifact(aarFile) { builtBy buildAar }
            pom { packaging = 'aar' }
        }
    }
    repositories { mavenLocal() }
}
