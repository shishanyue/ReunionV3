plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'cn.tesseract.soviet'
    compileSdk {
        version = release(36) {
            minorApiLevel = 1
        }
    }

    defaultConfig {
        applicationId "com.corrodinggames.rts"
        minSdk 21
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    useLibrary 'org.apache.http.legacy'
}

configurations.configureEach {
    resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
}

dependencies {
    implementation project(':core')
    implementation(libs.base.patched.android) {
        changing = true
    }
    implementation libs.crosshook.android
}

tasks.named('preBuild').configure {
    dependsOn ':patcher:publishAndroidPublicationToMavenLocal'
}

